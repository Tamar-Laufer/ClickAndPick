<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ביחד · כל הפריטים</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Assistant:wght@200;300;400;500;600&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="share/together.css" />
<link rel="stylesheet" href="share/items.css" />
</head>
<body class="items-page">

<!-- ════════ TOPBAR ════════ -->
<header class="topbar">
  <div class="wrap">
    <a class="brand" href="ביחד.html">
      <span class="brand-mark" aria-hidden="true">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
      </span>
      <span class="brand-name">ביחד</span>
    </a>
    <nav class="top-links">
      <a href="ביחד.html">בית</a>
      <a href="פריטים.html" class="active">פריטים</a>
      <a href="ביחד.html#process">איך זה עובד</a>
      <a href="ביחד.html#manifesto">עלינו</a>
    </nav>
    <div class="top-right">
      <button class="icon-btn" aria-label="חיפוש"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
      <button class="icon-btn" aria-label="חשבון"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21v-1a7 7 0 0 1 14 0v1"/></svg></button>
      <a class="btn btn-accent btn-sm" href="#">הצטרפו</a>
    </div>
  </div>
</header>

<!-- ════════ CATALOG ════════ -->
<main class="catalog">
  <div class="wrap">

    <div class="cat-hero">
      <div>
        <span class="kicker"><span class="idx">01</span> מה תרצו לשאול היום?</span>
        <h1>כל הפריטים <span class="accent">בשכונה</span></h1>
      </div>
      <div class="cat-count"><strong>248</strong> פריטים פנויים ברדיוס 2 ק״מ ממך</div>
    </div>

    <!-- search + sort -->
    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" placeholder="חיפוש פריט — מקדחה, אוהל, מכונת תפירה…" aria-label="חיפוש" />
      </div>
      <select class="sort" aria-label="מיון">
        <option>הקרובים ביותר</option>
        <option>הזולים ביותר</option>
        <option>המדורגים ביותר</option>
        <option>נוספו לאחרונה</option>
      </select>
    </div>

    <!-- category chips -->
    <div class="chips">
      <button class="chip active">הכל</button>
      <button class="chip"><i class="c-coral"></i>כלי עבודה</button>
      <button class="chip"><i class="c-teal"></i>אירוח</button>
      <button class="chip"><i class="c-butter"></i>ילדים ומשפחה</button>
      <button class="chip"><i class="c-green"></i>גינון</button>
      <button class="chip"><i class="c-blue"></i>ספורט ופנאי</button>
      <button class="chip"><i class="c-berry"></i>יצירה</button>
    </div>

    <!-- grid -->
    <div class="grid" id="grid"></div>

  </div>
</main>

<footer class="mini-footer">
  <div class="wrap">
    <span class="brand-name" style="font-family:var(--display);font-weight:500">ביחד</span>
    <span>© 2026 ביחד · שיתוף שכונתי</span>
  </div>
</footer>

<script src="share/image-slot.js"></script>
<script>
  const ITEMS = [
    { n:"מכונת שטיפה בלחץ", cat:"כלי עבודה", tag:"coral", d:"0.4 ק״מ", price:"₪21", rate:"4.9" },
    { n:"מקדחה נטענת", cat:"כלי עבודה", tag:"coral", d:"0.5 ק״מ", price:"₪9", rate:"5.0" },
    { n:"מפת אירוח 3 מ׳", cat:"אירוח", tag:"teal", d:"0.7 ק״מ", price:"₪15", rate:"4.8" },
    { n:"סט כיסאות מתקפלים", cat:"אירוח", tag:"teal", d:"0.9 ק״מ", price:"₪12", rate:"4.7" },
    { n:"עגלת תינוק", cat:"ילדים ומשפחה", tag:"butter", d:"1.1 ק״מ", price:"₪14", rate:"4.9" },
    { n:"כיסא בטיחות לרכב", cat:"ילדים ומשפחה", tag:"butter", d:"1.2 ק״מ", price:"₪10", rate:"5.0" },
    { n:"מכסחת דשא חשמלית", cat:"גינון", tag:"green", d:"0.8 ק״מ", price:"₪18", rate:"4.6" },
    { n:"ערכת גיזום וטיפוח", cat:"גינון", tag:"green", d:"1.0 ק״מ", price:"₪8", rate:"4.8" },
    { n:"אוהל 4 אנשים", cat:"ספורט ופנאי", tag:"blue", d:"1.3 ק״מ", price:"₪22", rate:"4.9" },
    { n:"קולר נסיעות גדול", cat:"ספורט ופנאי", tag:"blue", d:"1.4 ק״מ", price:"₪7", rate:"4.7" },
    { n:"מכונת תפירה", cat:"יצירה", tag:"berry", d:"1.0 ק״מ", price:"₪13", rate:"4.9" },
    { n:"מקרן וידאו ביתי", cat:"יצירה", tag:"berry", d:"1.6 ק״מ", price:"₪25", rate:"4.8" },
  ];

  const grid = document.getElementById('grid');
  grid.innerHTML = ITEMS.map((it, i) => `
    <a class="card" href="פריט.html">
      <div class="card-media">
        <image-slot id="cat-item-${i}" shape="rect" placeholder="${it.n}"></image-slot>
        <span class="card-tag tag-${it.tag}">${it.cat}</span>
        <button class="card-fav" type="button" aria-label="שמירה" onclick="event.preventDefault();this.classList.toggle('on');this.querySelector('svg').setAttribute('fill', this.classList.contains('on')?'currentColor':'none')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
        </button>
      </div>
      <div class="card-body">
        <span class="card-name">${it.n}</span>
        <span class="card-meta"><span class="dot"></span>פנוי · ${it.d} ממך</span>
        <div class="card-foot">
          <span class="card-price">${it.price} <span>/ ליום</span></span>
          <span class="card-rate"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.2 4.6 1.5 6.8L12 17.8 5.9 20.4l1.5-6.8L2.2 9l6.9-.7z"/></svg>${it.rate}</span>
        </div>
      </div>
    </a>`).join('');

  // localize image-slot empty caption
  customElements.whenDefined('image-slot').then(() => requestAnimationFrame(() => {
    document.querySelectorAll('image-slot').forEach(s => {
      const sub = s.shadowRoot && s.shadowRoot.querySelector('.sub');
      if (sub) sub.innerHTML = 'תמונת פריט';
    });
  }));

  // simple chip toggle (visual)
  document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
  }));
</script>
</body>
</html>
